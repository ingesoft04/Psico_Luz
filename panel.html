<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="theme-color" content="#247b6f"><title>Panel operativo | Psicóloga Luz Adriana</title><style>
:root{--g:#247b6f;--dark:#173d38;--cream:#f7f5ed;--muted:#687b77;--white:#fff;--red:#a34242;--shadow:0 18px 55px rgba(20,55,51,.12)}*{box-sizing:border-box}body{margin:0;font:15px/1.5 Inter,system-ui,sans-serif;background:var(--cream);color:var(--dark)}button,input,select{font:inherit}.app{display:grid;grid-template-columns:260px 1fr;min-height:100vh}.side{background:var(--dark);color:#fff;padding:28px 20px;display:flex;flex-direction:column}.brand{font-weight:900;font-size:1.1rem;margin-bottom:32px}.role{font-size:.75rem;letter-spacing:.12em;text-transform:uppercase;color:#a9d8cf;margin-bottom:16px}.nav{display:grid;gap:8px}.nav button{border:0;text-align:left;padding:13px 14px;border-radius:12px;background:transparent;color:#d7e9e5;font-weight:750}.nav button.on,.nav button:hover{background:#2b5a53;color:#fff}.logout{margin-top:auto;border:1px solid #6c8b86;background:transparent;color:#fff;border-radius:12px;padding:12px}.main{padding:34px;overflow:auto}.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:28px}h1,h2{font-family:Georgia,serif;margin:0}.top p{margin:5px 0;color:var(--muted)}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}.metric,.card{background:#fff;border:1px solid #e0e7e4;border-radius:20px;box-shadow:var(--shadow)}.metric{padding:22px}.metric b{display:block;font:2rem Georgia;color:var(--g)}.metric span{color:var(--muted)}.card{padding:22px;margin-top:20px}.card-head{display:flex;justify-content:space-between;gap:12px;align-items:center;margin-bottom:16px}.filters{display:flex;gap:10px;flex-wrap:wrap}input,select{border:1px solid #cfdbd7;border-radius:10px;padding:10px;background:white}.btn{border:0;border-radius:10px;padding:10px 14px;background:var(--g);color:#fff;font-weight:800}.table{width:100%;border-collapse:collapse}.table th,.table td{text-align:left;padding:12px;border-bottom:1px solid #e8edeb;vertical-align:top}.table th{font-size:.75rem;text-transform:uppercase;color:var(--muted)}.badge{display:inline-block;padding:4px 8px;border-radius:20px;background:#e4f3ee;color:var(--g);font-size:.75rem;font-weight:800}.empty{text-align:center;padding:30px;color:var(--muted)}.hidden{display:none}.login{width:min(440px,calc(100% - 32px));margin:9vh auto;background:#fff;padding:34px;border-radius:24px;box-shadow:var(--shadow)}.login label{display:grid;gap:7px;margin:15px 0;font-weight:800}.login input{width:100%}.login .btn{width:100%;padding:13px}.msg{color:var(--red);min-height:24px}.status-ok{color:#16835e;font-weight:850}@media(max-width:850px){.app{grid-template-columns:1fr}.side{position:static}.nav{grid-template-columns:repeat(2,1fr)}.logout{margin-top:20px}.main{padding:20px}.grid{grid-template-columns:repeat(2,1fr)}.table-wrap{overflow:auto}}@media(max-width:480px){.grid{grid-template-columns:1fr}.nav{grid-template-columns:1fr 1fr}}
</style></head><body>
<section class="login" id="login"><h1>Panel operativo</h1><p>Acceso exclusivo para psicóloga y mantenimiento.</p><label>Correo<input id="email" type="email"></label><label>Contraseña<input id="password" type="password"></label><div class="msg" id="msg"></div><button class="btn" id="login-btn">Ingresar</button></section>
<div class="app hidden" id="app"><aside class="side"><div class="brand">🧠 Psicóloga Luz Adriana</div><div class="role" id="role"></div><nav class="nav" id="nav"></nav><button class="logout" id="logout">Cerrar sesión</button></aside><main class="main"><header class="top"><div><h1 id="title">Panel</h1><p id="subtitle"></p></div><span id="identity"></span></header><div id="content"></div></main></div>
<script>
const API='/api/v1', $=x=>document.getElementById(x);let token=sessionStorage.getItem('opsToken'),user=JSON.parse(sessionStorage.getItem('opsUser')||'null');
async function api(path,opt={}){const r=await fetch(API+path,{...opt,headers:{'Content-Type':'application/json',Authorization:`Bearer ${token}`}}),d=await r.json().catch(()=>({}));if(!r.ok)throw Error(d.message||'No se pudo completar');return d}
async function login(){try{const r=await fetch(API+'/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:$('email').value,password:$('password').value})}),d=await r.json();if(!r.ok)throw Error(d.message);if(!['superadmin','psicologa'].includes(d.data.user.rol))throw Error('Esta cuenta no tiene acceso operativo');token=d.data.accessToken;user=d.data.user;sessionStorage.setItem('opsToken',token);sessionStorage.setItem('opsUser',JSON.stringify(user));start()}catch(e){$('msg').textContent=e.message}}
const viewsPsych=[['Resumen','summary'],['Agenda','agenda'],['Pacientes','patients'],['Horarios','schedule'],['Accesos clínicos','access']];
const viewsAdmin=[['Estado del sistema','status'],['Usuarios','users'],['Auditoría','audit'],['Migraciones','migrations']];
function start(){$('login').classList.add('hidden');$('app').classList.remove('hidden');$('role').textContent=user.rol==='psicologa'?'Operación clínica':'Mantenimiento técnico';$('identity').textContent=user.nombre+' · '+user.email;const views=user.rol==='psicologa'?viewsPsych:viewsAdmin;$('nav').innerHTML=views.map(([l,v],i)=>`<button data-view="${v}" class="${i?'':'on'}">${l}</button>`).join('');load(views[0][1])}
function table(headers,rows){return `<div class="table-wrap"><table class="table"><thead><tr>${headers.map(h=>`<th>${h}</th>`).join('')}</tr></thead><tbody>${rows||'<tr><td colspan="'+headers.length+'" class="empty">Sin registros</td></tr>'}</tbody></table></div>`}
async function load(v){document.querySelectorAll('.nav button').forEach(b=>b.classList.toggle('on',b.dataset.view===v));$('content').innerHTML='<div class="card empty">Cargando…</div>';try{
if(v==='summary'){let r=await api('/clinical/resumen'),d=r.data;$('title').textContent='Resumen clínico';$('subtitle').textContent='Vista general de la consulta';$('content').innerHTML=`<div class="grid">${[['Citas hoy',d.citas_hoy],['Próximas',d.proximas],['Pacientes',d.pacientes],['Lista de espera',d.espera]].map(x=>`<div class="metric"><b>${x[1]}</b><span>${x[0]}</span></div>`).join('')}</div>`}
if(v==='agenda'){let today=new Date().toISOString().slice(0,10),r=await api(`/clinical/agenda?desde=${today}&hasta=2030-12-31`);$('title').textContent='Agenda';$('subtitle').textContent='Sesiones programadas';$('content').innerHTML='<div class="card">'+table(['Fecha','Hora','Paciente','Modalidad','Estado','Registro'],r.data.map(c=>`<tr><td>${String(c.fecha).slice(0,10)}</td><td>${String(c.hora_inicio).slice(0,5)}</td><td>${c.nombre} ${c.apellido}<br><small>${c.telefono||''}</small></td><td>${c.modalidad}</td><td><span class="badge">${c.estado}</span></td><td><span title="${c.registro_diligenciado?'Registro diligenciado':'Registro pendiente'}" style="font-size:1.35rem;color:${c.registro_diligenciado?'#16835e':'#a34242'}">${c.registro_diligenciado?'✓':'✕'}</span> <button class="btn" data-note="${c.id}">${c.registro_diligenciado?'Ver sesión':'Registrar sesión'}</button></td></tr>`).join(''))+'</div>'}
if(v==='patients'){let r=await api('/clinical/pacientes');$('title').textContent='Pacientes';$('subtitle').textContent='Directorio clínico';$('content').innerHTML='<div class="card">'+table(['Nombre','Contacto','Ciudad','Desde'],r.data.map(p=>`<tr><td>${p.nombre} ${p.apellido}</td><td>${p.email}<br>${p.telefono||''}</td><td>${p.ciudad||'—'}</td><td>${String(p.created_at).slice(0,10)}</td></tr>`).join(''))+'</div>'}
if(v==='schedule'){let r=await api('/admin/horarios');$('title').textContent='Horarios';$('subtitle').textContent='Disponibilidad semanal';$('content').innerHTML='<div class="card">'+table(['Día','Inicio','Fin','Modalidad'],r.data.map(h=>`<tr><td>${['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'][h.dia_semana]}</td><td>${String(h.hora_inicio).slice(0,5)}</td><td>${String(h.hora_fin).slice(0,5)}</td><td>${h.modalidad}</td></tr>`).join(''))+'</div>'}
if(v==='access'){let r=await api('/clinical/auditoria-accesos');$('title').textContent='Accesos clínicos';$('subtitle').textContent='Trazabilidad de información sensible';$('content').innerHTML='<div class="card">'+table(['Fecha','Profesional','Paciente','Recurso','Acción'],r.data.map(a=>`<tr><td>${new Date(a.created_at).toLocaleString()}</td><td>${a.profesional}</td><td>${a.paciente||'—'}</td><td>${a.recurso}</td><td>${a.accion}</td></tr>`).join(''))+'</div>'}
if(v==='status'){let r=await api('/maintenance/estado'),d=r.data;$('title').textContent='Estado del sistema';$('subtitle').textContent='Sin acceso a datos clínicos';$('content').innerHTML=`<div class="grid">${Object.entries(d).map(([k,x])=>`<div class="metric"><b class="${x==='online'?'status-ok':''}">${x}</b><span>${k.replace('_',' ')}</span></div>`).join('')}</div>`}
if(v==='users'){let r=await api('/maintenance/usuarios');$('title').textContent='Usuarios';$('subtitle').textContent='Superadministración de cuentas';$('content').innerHTML='<div class="card"><div class="card-head"><h2>Usuarios</h2><button class="btn" id="create-user">Crear usuario</button></div>'+table(['Usuario','Rol','Estado','Último acceso','Acciones'],r.data.map(u=>`<tr><td>${u.nombre} ${u.apellido}<br><small>${u.email}</small></td><td><span class="badge">${u.rol}</span></td><td>${u.activo?'Activo':'Bloqueado'}</td><td>${u.ultimo_login?new Date(u.ultimo_login).toLocaleString():'Nunca'}</td><td><button class="mini" data-edit-user="${encodeURIComponent(JSON.stringify(u))}">Editar</button> <button class="mini danger" data-delete-user="${u.id}">Eliminar</button></td></tr>`).join(''))+'</div>'}
if(v==='audit'){let r=await api('/maintenance/auditoria');$('title').textContent='Auditoría técnica';$('subtitle').textContent='Cambios estructurales, sin contenido clínico';$('content').innerHTML='<div class="card">'+table(['Fecha','Tabla','Operación','Registro'],r.data.map(a=>`<tr><td>${new Date(a.created_at).toLocaleString()}</td><td>${a.tabla}</td><td>${a.operacion}</td><td>${a.registro_id||'—'}</td></tr>`).join(''))+'</div>'}
if(v==='migrations'){let r=await api('/maintenance/migraciones');$('title').textContent='Migraciones';$('subtitle').textContent='Versiones aplicadas a PostgreSQL';$('content').innerHTML='<div class="card">'+table(['Versión','Nombre','Aplicada'],r.data.map(m=>`<tr><td>${m.version}</td><td>${m.nombre}</td><td>${new Date(m.applied_at).toLocaleString()}</td></tr>`).join(''))+'</div>'}
}catch(e){$('content').innerHTML=`<div class="card empty">${e.message}</div>`}}
function clinicalNote(citaId){const clinicalWindow=window.open(`/sesion-clinica.html?cita=${encodeURIComponent(citaId)}`,'_blank');if(!clinicalWindow)alert('El navegador bloqueó la nueva pestaña. Permita ventanas emergentes para este sitio.')}
async function createUser(){const nombre=prompt('Nombre:');if(!nombre)return;const apellido=prompt('Apellido:');const email=prompt('Correo:');const password=prompt('Contraseña temporal (mínimo 10 caracteres):');const role=prompt('Rol: paciente, psicologa, recepcionista o superadmin:','paciente');try{await api('/maintenance/usuarios',{method:'POST',body:JSON.stringify({nombre,apellido,email,password,rol:role})});load('users')}catch(e){alert(e.message)}}
async function editUser(data){const nombre=prompt('Nombre:',data.nombre);if(!nombre)return;const apellido=prompt('Apellido:',data.apellido),email=prompt('Correo:',data.email),role=prompt('Rol:',data.rol),active=confirm('Aceptar = cuenta activa. Cancelar = bloqueada.'),password=prompt('Nueva contraseña (vacío conserva la actual):','');try{await api('/maintenance/usuarios/'+data.id,{method:'PUT',body:JSON.stringify({nombre,apellido,email,rol:role,activo:active,password:password||undefined})});load('users')}catch(e){alert(e.message)}}
async function deleteUser(id){if(!confirm('¿Eliminar esta cuenta? Se desactivará conservando la auditoría.'))return;try{await api('/maintenance/usuarios/'+id,{method:'DELETE'});load('users')}catch(e){alert(e.message)}}
$('login-btn').onclick=login;$('nav').onclick=e=>{let b=e.target.closest('[data-view]');if(b)load(b.dataset.view)};$('content').onclick=e=>{const n=e.target.closest('[data-note]'),d=e.target.closest('[data-delete-user]'),ed=e.target.closest('[data-edit-user]');if(n)clinicalNote(n.dataset.note);if(d)deleteUser(d.dataset.deleteUser);if(ed)editUser(JSON.parse(decodeURIComponent(ed.dataset.editUser)));if(e.target.id==='create-user')createUser()};$('logout').onclick=()=>{sessionStorage.clear();location.reload()};if(token&&user)start();
</script></body></html>
