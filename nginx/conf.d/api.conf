# nginx/conf.d/api.conf
# ── Rate limiting zones ────────────────────────────────────
limit_req_zone  $binary_remote_addr zone=api:10m     rate=20r/s;
limit_req_zone  $binary_remote_addr zone=auth:10m    rate=10r/m;
limit_conn_zone $binary_remote_addr zone=conn_lim:10m;

upstream api_backend {
  server api:4000;
  keepalive 32;
}

server {
  listen 80;
  server_name _;
  limit_req_status 429;

  # ── Seguridad HTTP Headers ──────────────────────────────
  add_header X-Frame-Options          "SAMEORIGIN"   always;
  add_header X-Content-Type-Options   "nosniff"      always;
  add_header X-XSS-Protection         "1; mode=block" always;
  add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy       "camera=(), microphone=(), geolocation=()" always;

  # ── Health check (sin rate limit) ──────────────────────
  location = /health {
    proxy_pass http://api_backend;
    proxy_http_version 1.1;
    access_log off;
  }

  # ── Auth endpoints — más restrictivos ──────────────────
  location ~ ^/api/v1/auth/(login|register|forgot) {
    limit_req zone=auth burst=3 nodelay;
    proxy_pass http://api_backend;
    include /etc/nginx/conf.d/proxy_params.conf;
  }

  # ── Webhooks — sin rate limit estricto ─────────────────
  location /api/v1/webhooks/ {
    proxy_pass http://api_backend;
    include /etc/nginx/conf.d/proxy_params.conf;
  }

  # ── API general ────────────────────────────────────────
  location /api/ {
    limit_req  zone=api burst=100 nodelay;
    limit_conn conn_lim 20;
    proxy_pass http://api_backend;
    include /etc/nginx/conf.d/proxy_params.conf;
  }

  # ── Archivos estáticos del frontend (si aplica) ────────
  location / {
    root  /var/www/html;
    index index.html;
    try_files $uri $uri/ /index.html;
  }

  # 404 / 50x
  error_page 404      /404.json;
  error_page 500 502 503 504 /50x.json;
  location = /404.json { return 404 '{"ok":false,"message":"No encontrado"}'; add_header Content-Type application/json; }
  location = /50x.json { return 500 '{"ok":false,"message":"Error del servidor"}'; add_header Content-Type application/json; }
}
